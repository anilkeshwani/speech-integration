name: Lint
on:
  push:
    branches:
      - main
      - dev
  pull_request: null
jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Lint (ruff check)
        run: uv run ruff check --output-format github .
      - name: Format (ruff format --check)
        run: uv run ruff format --check .
  shell:
    name: Shell (shfmt + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Format check (shfmt)
        run: git ls-files '*.sh' | xargs -r uv run shfmt --diff
      - name: Lint (shellcheck)
        run: git ls-files '*.sh' | xargs -r uv run shellcheck
  toml:
    name: TOML (taplo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x64.gz \
            | gzip -d - \
            | sudo install -m 755 /dev/stdin /usr/local/bin/taplo
      - name: Format check (taplo)
        run: taplo fmt --check
  yaml:
    name: YAML (yamlfix + yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Format check (yamlfix --check)
        run: uv run yamlfix --check --exclude '.venv' --exclude 'conf/data/sft' conf/
      - name: Lint (yamllint)
        run: uv run yamllint .
